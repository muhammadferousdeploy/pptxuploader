<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduVault - Portal PPTX Premium</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for In-Browser JSX Compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map for Modern ES Modules (React & Firebase) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/0.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');

    :root {
      --glass-light: rgba(255, 255, 255, 0.4);
      --glass-border-light: rgba(255, 255, 255, 0.5);
      --glass-dark: rgba(20, 20, 25, 0.45);
      --glass-border-dark: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      overflow-x: hidden;
      transition: background-color 0.5s ease;
    }

    /* Liquid Backgrounds */
    .bg-liquid-light {
      background: radial-gradient(circle at 15% 50%, #fdfbfb 0%, #ebedee 100%),
                  radial-gradient(circle at 85% 30%, #e0c3fc 0%, #8ec5fc 100%);
      background-blend-mode: multiply;
    }

    .bg-liquid-dark {
      background: radial-gradient(circle at 15% 50%, #0f172a 0%, #1e1b4b 100%),
                  radial-gradient(circle at 85% 30%, #312e81 0%, #000000 100%);
      background-blend-mode: screen;
    }

    /* Ambient Floating Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out alternate;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 50px) scale(1.1); }
      100% { transform: translate(-50px, 100px) scale(0.9); }
    }

    /* Core Glassmorphism Utility */
    .glass-panel {
      background: var(--glass-light);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border-light);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }

    .dark .glass-panel {
      background: var(--glass-dark);
      border: 1px solid var(--glass-border-dark);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    /* Custom Animations */
    @keyframes bounce-down {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    .animate-bounce-down {
      animation: bounce-down 0.8s infinite ease-in-out;
    }

    @keyframes bounce-up {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-bounce-up {
      animation: bounce-up 0.8s infinite ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    .confetti-piece {
      animation: confetti-fall forwards linear;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); }
  </style>
</head>
<body>

  <!-- App Mounting Node -->
  <div id="root"></div>

  <!-- React Code with Babel Compiler -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, createContext, useContext } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from 'firebase/firestore';

    // --- Elegant Custom SVG Icons (Replacing Lucide Dependency) ---
    const Icon = ({ name, className = "w-5 h-5", size = 20 }) => {
      const icons = {
        menu: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />,
        x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />,
        user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />,
        download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
        upload: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />,
        lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
        fileText: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
        checkCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />,
        chevronDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />,
        arrowDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 13l-7 7-7-7m7 7V3" />,
        arrowUp: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 11l7-7 7 7M12 4v16" />,
        sun: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />,
        moon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />,
        logOut: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />,
        cloud: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />,
        alertCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} style={{ width: size, height: size }}>
          {icons[name] || null}
        </svg>
      );
    };

    // --- Firebase Config & Initialization ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "",
      authDomain: "eduvault-demo.firebaseapp.com",
      projectId: "eduvault-demo",
      storageBucket: "eduvault-demo.appspot.com",
      messagingSenderId: "12345678",
      appId: "1:1234:web:abcd"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const AppContext = createContext();

    const AnimatedDots = () => {
      const [dots, setDots] = useState('');
      useEffect(() => {
        const interval = setInterval(() => {
          setDots(prev => prev.length >= 3 ? '' : prev + '.');
        }, 500);
        return () => clearInterval(interval);
      }, []);
      return <span className="inline-block w-4 text-left">{dots}</span>;
    };

    const Confetti = () => {
      const colors = ['#3b82f6', '#ec4899', '#10b981', '#f59e0b', '#8b5cf6'];
      return (
        <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
          {[...Array(60)].map((_, i) => {
            const left = Math.random() * 100;
            const animDuration = Math.random() * 2 + 2;
            const delay = Math.random() * 0.5;
            const color = colors[Math.floor(Math.random() * colors.length)];
            return (
              <div
                key={i}
                className="absolute w-3 h-3 rounded-full confetti-piece"
                style={{
                  left: `${left}vw`,
                  top: '-5vh',
                  backgroundColor: color,
                  animationDuration: `${animDuration}s`,
                  animationDelay: `${delay}s`,
                }}
              />
            );
          })}
        </div>
      );
    };

    const GlassButton = ({ children, onClick, className = "", variant = "primary", disabled = false, icon: iconName }) => {
      const baseStyle = "relative flex items-center justify-center gap-2 px-6 py-3 font-semibold rounded-full overflow-hidden transition-all duration-300 ease-out active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100";
      const variants = {
        primary: "bg-blue-600/90 hover:bg-blue-500 text-white shadow-[0_0_20px_rgba(37,99,235,0.4)] border border-blue-400/30",
        secondary: "glass-panel text-gray-800 dark:text-gray-200 hover:bg-white/50 dark:hover:bg-white/10",
        danger: "bg-red-500/90 hover:bg-red-400 text-white shadow-[0_0_20px_rgba(239,68,68,0.4)]",
      };

      return (
        <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} disabled={disabled}>
          <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] hover:translate-x-[100%] transition-transform duration-700"></div>
          {iconName && <Icon name={iconName} size={18} className="relative z-10" />}
          <span className="relative z-10">{children}</span>
        </button>
      );
    };

    const FileCard = ({ file, index, category }) => {
      const { appUser } = useContext(AppContext);
      const [downloadState, setDownloadState] = useState('idle');
      const [progress, setProgress] = useState(0);

      const isLocked = () => {
        if (appUser.role === 'admin' || appUser.role === 'student' || appUser.role === 'teacher') return false;
        if (appUser.role === 'guest') {
          if (category !== 'Tingkatan 1') return true;
          if (index >= 4) return true;
          return false;
        }
        return true;
      };

      const locked = isLocked();

      const handleDownload = () => {
        if (locked || downloadState !== 'idle') return;
        setDownloadState('downloading');
        let p = 0;
        const interval = setInterval(() => {
          p += Math.random() * 20;
          if (p >= 100) {
            clearInterval(interval);
            setProgress(100);
            setDownloadState('done');
            setTimeout(() => {
              setDownloadState('idle');
              setProgress(0);
            }, 3000);
          } else {
            setProgress(p);
          }
        }, 500);
      };

      return (
        <div className={`relative glass-panel rounded-3xl p-6 flex flex-col justify-between group overflow-hidden transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl ${locked ? 'opacity-80' : ''}`}>
          {locked && (
            <div className="absolute inset-0 z-20 backdrop-blur-md bg-white/10 dark:bg-black/40 flex flex-col items-center justify-center p-6 text-center rounded-3xl transition-opacity">
              <div className="bg-red-500/20 p-4 rounded-full mb-4 border border-red-500/30">
                <Icon name="lock" className="text-red-500 dark:text-red-400 w-8 h-8" size={32} />
              </div>
              <p className="text-sm font-medium text-gray-800 dark:text-gray-200">
                Untuk mengakses bahan ini sila log masuk menggunakan akaun DELIMa anda.
              </p>
            </div>
          )}

          <div className="z-10 relative">
            <div className="w-12 h-12 rounded-full bg-blue-100/50 dark:bg-blue-900/30 flex items-center justify-center mb-4 border border-blue-200 dark:border-blue-800">
              <Icon name="fileText" className="text-blue-600 dark:text-blue-400 w-6 h-6" size={24} />
            </div>
            <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-1 line-clamp-2">{file.title}</h3>
            <p className="text-sm text-gray-600 dark:text-gray-400 mb-6">{file.subject} • {file.category}</p>
          </div>

          <div className="z-10 relative mt-auto">
            <button
              onClick={handleDownload}
              disabled={locked}
              className={`w-full relative overflow-hidden rounded-full py-3 px-4 flex items-center justify-center transition-all duration-300 font-medium
                ${downloadState === 'idle' ? 'bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] shadow-lg' : ''}
                ${downloadState === 'downloading' ? 'bg-blue-500 text-white' : ''}
                ${downloadState === 'done' ? 'bg-green-500 text-white' : ''}
              `}
            >
              {downloadState === 'downloading' && (
                <div 
                  className="absolute left-0 top-0 bottom-0 bg-blue-600 transition-all duration-300 ease-out"
                  style={{ width: `${progress}%` }}
                />
              )}

              <div className="relative z-10 flex items-center gap-2">
                {downloadState === 'idle' && (
                  <>
                    <Icon name="download" size={18} className="group-hover:animate-bounce-down" />
                    Muat Turun
                  </>
                )}
                {downloadState === 'downloading' && (
                  <>
                    <Icon name="arrowDown" size={18} className="animate-bounce-down" />
                    <span>Downloading<AnimatedDots /></span>
                  </>
                )}
                {downloadState === 'done' && (
                  <>
                    <Icon name="checkCircle" size={18} className="animate-pulse" />
                    Selesai
                  </>
                )}
              </div>
            </button>
          </div>
        </div>
      );
    };

    const Sidebar = ({ isOpen, setIsOpen, currentCategory, setCurrentCategory }) => {
      const categories = ['Tingkatan 1', 'Tingkatan 2', 'Tingkatan 3', 'Tingkatan 4', 'Tingkatan 5 SPM'];

      return (
        <>
          {isOpen && (
            <div 
              className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 lg:hidden"
              onClick={() => setIsOpen(false)}
            />
          )}
          
          <aside className={`fixed lg:static top-0 left-0 h-full w-72 glass-panel !rounded-none !border-y-0 !border-l-0 z-50 transform transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${isOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} flex flex-col`}>
            <div className="p-8 flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
                <Icon name="cloud" className="text-white w-5 h-5" size={20} />
              </div>
              <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 tracking-tight">
                EduVault
              </h1>
              <button className="lg:hidden ml-auto glass-panel p-2 rounded-full" onClick={() => setIsOpen(false)}>
                <Icon name="x" className="text-gray-600 dark:text-gray-300" size={20} />
              </button>
            </div>

            <nav className="flex-1 px-4 space-y-2 overflow-y-auto">
              <p className="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4 mt-4">Kategori</p>
              {categories.map((cat) => (
                <button
                  key={cat}
                  onClick={() => { setCurrentCategory(cat); setIsOpen(false); }}
                  className={`w-full text-left px-5 py-4 rounded-2xl transition-all duration-300 font-medium flex items-center gap-3
                    ${currentCategory === cat 
                      ? 'bg-blue-500/10 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800 shadow-[inset_0_0_20px_rgba(59,130,246,0.05)]' 
                      : 'text-gray-600 dark:text-gray-400 hover:bg-white/20 dark:hover:bg-white/5 hover:translate-x-1'
                    }
                  `}
                >
                  <div className={`w-2 h-2 rounded-full ${currentCategory === cat ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)]' : 'bg-transparent'}`} />
                  {cat}
                </button>
              ))}
            </nav>
          </aside>
        </>
      );
    };

    const TopBar = ({ toggleSidebar }) => {
      const { appUser, setAppUser, theme, setTheme } = useContext(AppContext);
      const [showProfileMenu, setShowProfileMenu] = useState(false);
      const fileInputRef = useRef(null);
      const [profilePic, setProfilePic] = useState(null);

      const handleLogout = () => {
        setAppUser(null);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setProfilePic(reader.result);
          reader.readAsDataURL(file);
        }
      };

      return (
        <header className="sticky top-0 z-30 w-full px-6 py-4 flex items-center justify-between backdrop-blur-xl bg-white/10 dark:bg-black/10 border-b border-white/20 dark:border-white/5">
          <div className="flex items-center gap-4">
            <button onClick={toggleSidebar} className="lg:hidden glass-panel p-2.5 rounded-full hover:scale-105 transition-transform">
              <Icon name="menu" className="text-gray-800 dark:text-gray-200" size={20} />
            </button>
            {appUser.role === 'admin' && (
              <span className="hidden sm:inline-flex items-center px-4 py-1.5 rounded-full bg-purple-500/20 text-purple-700 dark:text-purple-300 text-sm font-semibold border border-purple-500/30">
                Admin Mode Active
              </span>
            )}
          </div>

          <div className="flex items-center gap-4">
            <button 
              onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
              className="glass-panel p-3 rounded-full hover:scale-110 transition-transform"
            >
              {theme === 'dark' ? <Icon name="sun" size={18} className="text-yellow-400" /> : <Icon name="moon" size={18} className="text-blue-900" />}
            </button>

            <div className="relative">
              <button 
                onClick={() => setShowProfileMenu(!showProfileMenu)}
                className="flex items-center gap-3 glass-panel p-1.5 pr-5 rounded-full hover:bg-white/30 dark:hover:bg-white/10 transition-all"
              >
                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-indigo-500 flex items-center justify-center overflow-hidden border-2 border-white/50 shadow-inner">
                  {profilePic ? (
                    <img src={profilePic} alt="Profile" className="w-full h-full object-cover" />
                  ) : (
                    <Icon name="user" size={20} className="text-white" />
                  )}
                </div>
                <div className="hidden sm:block text-left">
                  <p className="text-sm font-bold text-gray-900 dark:text-white leading-tight">{appUser.name}</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400 capitalize">{appUser.role.replace('_', ' ')}</p>
                </div>
                <Icon name="chevronDown" size={14} className="text-gray-500 ml-1" />
              </button>

              {showProfileMenu && (
                <div className="absolute right-0 mt-3 w-72 glass-panel rounded-3xl p-5 shadow-2xl origin-top-right animate-in fade-in zoom-in duration-200">
                  <div className="flex flex-col items-center mb-5 pb-5 border-b border-gray-200/20 dark:border-gray-700/50">
                    <div className="relative group cursor-pointer mb-3" onClick={() => fileInputRef.current?.click()}>
                      <div className="w-20 h-20 rounded-full bg-gradient-to-tr from-blue-400 to-indigo-500 flex items-center justify-center overflow-hidden border-4 border-white/20 shadow-xl group-hover:scale-105 transition-transform">
                        {profilePic ? <img src={profilePic} alt="Profile" className="w-full h-full object-cover" /> : <Icon name="user" size={32} className="text-white" />}
                      </div>
                      <div className="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <Icon name="upload" size={20} className="text-white" />
                      </div>
                    </div>
                    <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                    
                    <h4 className="text-lg font-bold text-gray-900 dark:text-white">{appUser.name}</h4>
                    <p className="text-sm text-gray-500">{appUser.email}</p>
                    {appUser.school && <p className="text-xs text-blue-600 dark:text-blue-400 mt-1 font-medium bg-blue-100/50 dark:bg-blue-900/30 px-3 py-1 rounded-full">{appUser.school}</p>}
                  </div>
                  <GlassButton variant="danger" className="w-full" onClick={handleLogout} icon="logOut">
                    Log Keluar
                  </GlassButton>
                </div>
              )}
            </div>
          </div>
        </header>
      );
    };

    const AdminDashboard = () => {
      const [isDragging, setIsDragging] = useState(false);
      const [file, setFile] = useState(null);
      const [title, setTitle] = useState('');
      const [subject, setSubject] = useState('');
      const [category, setCategory] = useState('Tingkatan 1');
      const [uploadState, setUploadState] = useState('idle');
      const [progress, setProgress] = useState(0);
      const [speed, setSpeed] = useState('0 KB/s');
      const [errorMsg, setErrorMsg] = useState('');

      const generateSpeed = () => {
        const speeds = [
          `${Math.floor(Math.random() * 900 + 100)} KB/s`,
          `${Math.floor(Math.random() * 50 + 10)} MB/s`,
          `${(Math.random() * 2 + 0.1).toFixed(2)} GB/s`
        ];
        return speeds[Math.floor(Math.random() * speeds.length)];
      };

      const validateFile = (selectedFile) => {
        setErrorMsg('');
        if (!selectedFile) return;
        if (!selectedFile.name.toLowerCase().endsWith('.pptx')) {
          setErrorMsg('Sila muat naik fail format PPTX sahaja.');
          setFile(null);
          return;
        }
        setFile(selectedFile);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        validateFile(e.dataTransfer.files[0]);
      };

      const handleUploadClick = async () => {
        if (!file || !title || !subject) {
          setErrorMsg('Sila lengkapkan semua maklumat dan pilih fail.');
          return;
        }

        setUploadState('uploading');
        let p = 0;
        
        const interval = setInterval(() => {
          p += Math.random() * 10;
          setSpeed(generateSpeed());
          
          if (p >= 100) {
            clearInterval(interval);
            setProgress(100);
            setUploadState('success');
            
            const saveToDB = async () => {
              try {
                const docRef = collection(db, 'artifacts', appId, 'public', 'data', 'presentations');
                await addDoc(docRef, {
                  title,
                  subject,
                  category,
                  fileName: file.name,
                  size: (file.size / (1024*1024)).toFixed(2) + ' MB',
                  uploadedAt: serverTimestamp(),
                });
              } catch(e) { console.error(e) }
            };
            saveToDB();

            setTimeout(() => {
              setUploadState('idle');
              setFile(null);
              setTitle('');
              setSubject('');
              setProgress(0);
            }, 5000);
          } else {
            setProgress(p);
          }
        }, 400);
      };

      return (
        <div className="max-w-4xl mx-auto w-full animate-in slide-in-from-bottom-8 duration-700">
          {uploadState === 'success' && <Confetti />}

          <div className="glass-panel rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/20 rounded-full blur-[80px] -z-10 mix-blend-screen pointer-events-none"></div>

            <h2 className="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">Muat Naik Bahan</h2>
            <p className="text-gray-500 dark:text-gray-400 mb-10">Tambah slaid PPTX baharu ke dalam sistem EduVault.</p>

            {errorMsg && (
              <div className="mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/30 flex items-center gap-3 text-red-600 dark:text-red-400 animate-shake">
                <Icon name="alertCircle" size={20} />
                <span className="font-medium">{errorMsg}</span>
              </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <InputField label="Nama Pelajaran" value={subject} onChange={e => setSubject(e.target.value)} placeholder="Contoh: Sejarah, Sains..." disabled={uploadState !== 'idle'} />
              <InputField label="Tajuk Pelajaran" value={title} onChange={e => setTitle(e.target.value)} placeholder="Contoh: Bab 1 - Pengenalan..." disabled={uploadState !== 'idle'} />
            </div>

            <div className="mb-8">
               <label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 ml-1">Kategori Tingkatan</label>
               <select 
                 value={category} 
                 onChange={e => setCategory(e.target.value)}
                 disabled={uploadState !== 'idle'}
                 className="w-full bg-white/40 dark:bg-black/40 border border-gray-300/50 dark:border-gray-600/50 rounded-2xl px-5 py-4 text-gray-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-blue-500/30 appearance-none backdrop-blur-sm"
               >
                 {['Tingkatan 1', 'Tingkatan 2', 'Tingkatan 3', 'Tingkatan 4', 'Tingkatan 5 SPM'].map(cat => (
                   <option key={cat} value={cat} className="text-black bg-white dark:bg-gray-800">{cat}</option>
                 ))}
               </select>
            </div>

            <div 
              onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
              onClick={() => uploadState === 'idle' && document.getElementById('file-upload').click()}
              className={`relative border-2 border-dashed rounded-[2.5rem] p-12 text-center cursor-pointer transition-all duration-300 group
                ${isDragging ? 'border-blue-500 bg-blue-500/10 shadow-[0_0_30px_rgba(59,130,246,0.3)]' : 'border-gray-400/40 dark:border-gray-600/40 hover:border-blue-400/60 hover:bg-white/10 dark:hover:bg-white/5'}
                ${uploadState !== 'idle' ? 'pointer-events-none opacity-50' : ''}
              `}
            >
              <input type="file" id="file-upload" className="hidden" accept=".pptx" onChange={e => validateFile(e.target.files[0])} />
              
              <div className="w-20 h-20 mx-auto rounded-full bg-blue-100/50 dark:bg-blue-900/30 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner">
                <Icon name="upload" className={`w-10 h-10 ${isDragging ? 'text-blue-600' : 'text-blue-500/70 dark:text-blue-400/70'}`} size={40} />
              </div>
              
              <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-2">
                {file ? file.name : 'Tarik & Lepas Fail Di Sini'}
              </h3>
              <p className="text-gray-500 dark:text-gray-400">
                {file ? `${(file.size / (1024*1024)).toFixed(2)} MB` : 'Atau klik untuk melayari folder. Hanya fail PPTX dibenarkan.'}
              </p>
            </div>

            <div className="mt-8 flex flex-col items-center">
              {uploadState === 'idle' ? (
                <GlassButton onClick={handleUploadClick} className="w-full md:w-auto md:px-16" disabled={!file || !title || !subject}>
                   Muat Naik Sekarang
                </GlassButton>
              ) : uploadState === 'uploading' ? (
                <div className="w-full max-w-md">
                   <div className="flex justify-between text-sm font-semibold mb-2 text-blue-600 dark:text-blue-400">
                     <span className="flex items-center gap-1"><Icon name="arrowUp" size={16} className="animate-bounce-up"/> Uploading<AnimatedDots/></span>
                     <span>{Math.round(progress)}%</span>
                   </div>
                   <div className="h-4 w-full bg-gray-200/50 dark:bg-gray-800/50 rounded-full overflow-hidden backdrop-blur-md border border-white/10">
                     <div className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }} />
                   </div>
                   <div className="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                     <span>{(file.size / (1024*1024) * (progress/100)).toFixed(2)} / {(file.size / (1024*1024)).toFixed(2)} MB</span>
                     <span className="text-purple-500 dark:text-purple-400">{speed}</span>
                   </div>
                </div>
              ) : (
                <div className="flex flex-col items-center animate-in zoom-in duration-500">
                  <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(34,197,94,0.6)] mb-4">
                    <Icon name="checkCircle" className="text-white w-8 h-8" size={32} />
                  </div>
                  <h3 className="text-2xl font-bold text-green-600 dark:text-green-400">Upload Successfully!</h3>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    };

    const AuthScreen = () => {
      const { setAppUser, theme, setTheme } = useContext(AppContext);
      const [loadingType, setLoadingType] = useState(null);
      const [adminMode, setAdminMode] = useState(false);
      const [adminUser, setAdminUser] = useState('');
      const [adminPass, setAdminPass] = useState('');
      const [adminError, setAdminError] = useState('');

      const simulateLogin = (role, details) => {
        setLoadingType(role);
        setTimeout(() => {
           setAppUser({ role, ...details });
           localStorage.setItem('eduvault_session', Date.now().toString());
        }, 2500);
      };

      const handleDelimaLogin = async () => {
        setLoadingType('student');
        try {
          const provider = new GoogleAuthProvider();
          const result = await signInWithPopup(auth, provider);
          const user = result.user;
          
          setAppUser({ 
            role: 'student', 
            name: user.displayName || 'Pelajar', 
            email: user.email, 
            school: 'SMK Chung Hwa Tenom'
          });
          localStorage.setItem('eduvault_session', Date.now().toString());
        } catch (error) {
          if (error.code === 'auth/unauthorized-domain') {
            console.warn("Domain unauthorized. Falling back to simulation mode.");
            alert("Nota: Domain pratonton ini belum didaftarkan dalam Firebase. Untuk tujuan pengujian, log masuk simulasi DELIMa akan diaktifkan secara automatik.");
            setAppUser({ 
              role: 'student', 
              name: 'Pelajar DELIMa (Simulasi)', 
              email: 'pelajar-delima@moe-dl.edu.my', 
              school: 'SMK Chung Hwa Tenom' 
            });
            localStorage.setItem('eduvault_session', Date.now().toString());
          } else {
            console.error("Ralat Google login:", error);
            alert("Ralat log masuk Google: " + error.message);
          }
        } finally {
          setLoadingType(null);
        }
      };

      const handleGuestLogin = () => {
        simulateLogin('guest', { name: 'Pengguna Jemputan', email: 'guest@eduvault.local', school: '' });
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminUser === 'Muhammad Ferous Admin' && adminPass === 'MuhammadFerous40*****') {
          setAdminError('');
          simulateLogin('admin', { name: 'Muhammad Ferous', email: 'admin@eduvault.moe', school: 'KPM Hub' });
        } else {
          setAdminError('Username atau kata laluan tidak sah.');
        }
      };

      return (
        <div className={`min-h-screen flex items-center justify-center p-6 ${theme === 'dark' ? 'dark bg-liquid-dark' : 'bg-liquid-light'} relative overflow-hidden`}>
          <div className="orb w-[500px] h-[500px] bg-blue-500/20 top-[-10%] left-[-10%]"></div>
          <div className="orb w-[600px] h-[600px] bg-purple-500/20 bottom-[-20%] right-[-10%]" style={{animationDelay: '-5s'}}></div>
          
          <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="absolute top-6 right-6 glass-panel p-3 rounded-full z-50">
            {theme === 'dark' ? <Icon name="sun" size={20} className="text-yellow-400" /> : <Icon name="moon" size={20} className="text-blue-900" />}
          </button>

          <div className="glass-panel w-full max-w-md p-10 rounded-[2.5rem] relative z-10 overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-1000">
            <div className="text-center mb-10">
               <div className="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center shadow-xl mb-6">
                 <Icon name="cloud" className="text-white w-10 h-10" size={40} />
               </div>
               <h1 className="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">EduVault</h1>
               <p className="text-gray-500 dark:text-gray-400">Platform Perkongsian Bahan Mengajar</p>
            </div>

            {loadingType ? (
              <div className="flex flex-col items-center justify-center py-10 space-y-6">
                <div className="w-16 h-16 border-4 border-blue-200 dark:border-blue-900 border-t-blue-600 dark:border-t-blue-400 rounded-full animate-spin"></div>
                <p className="text-lg font-medium text-gray-700 dark:text-gray-300">
                   {loadingType === 'student' ? 'Mengesahkan akaun DELIMa...' : 'Memuatkan sesi anda...'}
                </p>
              </div>
            ) : (
              <div className="space-y-4 relative">
                 <div className={`transition-all duration-500 ${adminMode ? '-translate-x-full opacity-0 hidden' : 'translate-x-0 opacity-100 block'}`}>
                    <GlassButton className="w-full py-4 text-lg" onClick={handleDelimaLogin}>
                      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" className="w-5 h-5 mr-1 bg-white rounded-full p-0.5" />
                      Log Masuk dengan DELIMa
                    </GlassButton>
                    
                    <div className="relative my-8">
                      <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-300/30 dark:border-gray-600/30"></div></div>
                      <div className="relative flex justify-center text-sm"><span className="px-4 bg-transparent text-gray-500">ATAU</span></div>
                    </div>

                    <GlassButton variant="secondary" className="w-full" onClick={handleGuestLogin}>
                      Log Masuk Sebagai Guest
                    </GlassButton>

                    <div className="mt-8 text-center">
                      <button onClick={() => setAdminMode(true)} className="text-sm font-medium text-blue-600 dark:text-blue-400 hover:underline">
                        Log Masuk Sebagai Admin
                      </button>
                    </div>
                 </div>

                 <div className={`transition-all duration-500 ${!adminMode ? 'translate-x-full opacity-0 hidden' : 'translate-x-0 opacity-100 block'}`}>
                   <form onSubmit={handleAdminLogin} className="space-y-4">
                      {adminError && (
                        <div className="p-3 text-sm text-red-600 dark:text-red-400 bg-red-500/10 border border-red-500/30 rounded-xl flex items-center gap-2 animate-shake">
                          <Icon name="alertCircle" size={16} />
                          {adminError}
                        </div>
                      )}
                      <input 
                        type="text" required placeholder="Username Admin" value={adminUser} onChange={e=>{setAdminUser(e.target.value); setAdminError('');}}
                        className="w-full bg-white/40 dark:bg-black/40 border border-gray-300/50 dark:border-gray-600/50 rounded-2xl px-5 py-4 text-gray-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-purple-500/30"
                      />
                      <input 
                        type="password" required placeholder="Kata Laluan" value={adminPass} onChange={e=>{setAdminPass(e.target.value); setAdminError('');}}
                        className="w-full bg-white/40 dark:bg-black/40 border border-gray-300/50 dark:border-gray-600/50 rounded-2xl px-5 py-4 text-gray-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-purple-500/30"
                      />
                      <GlassButton className="w-full mt-6 bg-purple-600 hover:bg-purple-500 border-purple-400 shadow-[0_0_20px_rgba(147,51,234,0.4)]" type="submit">
                        Log Masuk Ruang Admin
                      </GlassButton>
                      <div className="text-center mt-4">
                        <button type="button" onClick={() => setAdminMode(false)} className="text-sm text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 transition-colors">
                          Kembali
                        </button>
                      </div>
                   </form>
                 </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    export default function App() {
      const [appUser, setAppUser] = useState(null);
      const [theme, setTheme] = useState('dark');
      const [currentCategory, setCurrentCategory] = useState('Tingkatan 1');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [filesData, setFilesData] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (appUser) {
          const sessionStart = localStorage.getItem('eduvault_session');
          if (sessionStart && Date.now() - parseInt(sessionStart) > 3600000) {
            setAppUser(null);
            alert("Sesi anda telah tamat. Sila log masuk semula.");
          }
        }
      }, [appUser]);

      useEffect(() => {
        let unsubscribeSnap = null;

        const initFirebase = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            
            const q = query(
              collection(db, 'artifacts', appId, 'public', 'data', 'presentations'),
              orderBy('uploadedAt', 'desc')
            );

            unsubscribeSnap = onSnapshot(q, (snapshot) => {
              const fetchedFiles = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              
              if (fetchedFiles.length === 0) {
                setFilesData([
                  { id: 'm1', title: 'Bab 1: Pengenalan kepada Sains', subject: 'Sains', category: 'Tingkatan 1' },
                  { id: 'm2', title: 'Bab 2: Sel sebagai Unit Asas', subject: 'Sains', category: 'Tingkatan 1' },
                  { id: 'm3', title: 'Bab 1: Mengenali Sejarah', subject: 'Sejarah', category: 'Tingkatan 1' },
                  { id: 'm4', title: 'Bab 2: Zaman Air Batu', subject: 'Sejarah', category: 'Tingkatan 1' },
                  { id: 'm5', title: 'Bab 3: Zaman Prasejarah', subject: 'Sejarah', category: 'Tingkatan 1' },
                  { id: 'm6', title: 'Bab 1: Nombor Nisbah', subject: 'Matematik', category: 'Tingkatan 1' },
                  { id: 'm7', title: 'Bab 1: Biodiversiti', subject: 'Sains', category: 'Tingkatan 2' },
                  { id: 'm8', title: 'Bab 1: Kedatangan Kuasa Barat', subject: 'Sejarah', category: 'Tingkatan 3' },
                ]);
              } else {
                setFilesData(fetchedFiles);
              }
              setLoading(false);
            }, (error) => {
              console.error("Firestore Error:", error);
              setLoading(false);
            });

          } catch (err) {
            console.error("Auth init error:", err);
            setLoading(false);
          }
        };

        initFirebase();
        return () => unsubscribeSnap && unsubscribeSnap();
      }, []);

      if (!appUser) {
        return (
          <AppContext.Provider value={{ setAppUser, theme, setTheme }}>
            <AuthScreen />
          </AppContext.Provider>
        );
      }

      const filteredFiles = filesData.filter(f => f.category === currentCategory);

      return (
        <AppContext.Provider value={{ appUser, setAppUser, theme, setTheme }}>
          <div className={`flex h-screen overflow-hidden ${theme === 'dark' ? 'dark bg-liquid-dark' : 'bg-liquid-light'} relative`}>
            
            <div className="orb w-[800px] h-[800px] bg-blue-500/10 top-[-20%] left-[-10%] pointer-events-none"></div>
            <div className="orb w-[600px] h-[600px] bg-purple-500/10 bottom-[-10%] right-[-10%] pointer-events-none" style={{animationDelay: '-10s'}}></div>

            <Sidebar 
              isOpen={isSidebarOpen} 
              setIsOpen={setIsSidebarOpen} 
              currentCategory={currentCategory} 
              setCurrentCategory={setCurrentCategory} 
            />

            <div className="flex-1 flex flex-col h-full relative z-10">
              <TopBar toggleSidebar={() => setIsSidebarOpen(!isSidebarOpen)} />
              
              <main className="flex-1 overflow-y-auto p-6 md:p-10">
                {appUser.role === 'admin' && currentCategory === 'Tingkatan 1' ? (
                  <AdminDashboard />
                ) : null}

                {!(appUser.role === 'admin' && currentCategory === 'Tingkatan 1') && (
                  <div className="animate-in fade-in duration-700">
                    <div className="mb-8 glass-panel inline-block px-6 py-3 rounded-full border border-white/20">
                      <h2 className="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400">
                        {currentCategory}
                      </h2>
                    </div>
                    
                    {loading ? (
                      <div className="flex justify-center py-20">
                        <div className="w-12 h-12 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
                      </div>
                    ) : filteredFiles.length > 0 ? (
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20">
                        {filteredFiles.map((file, idx) => (
                          <FileCard key={file.id} file={file} index={idx} category={currentCategory} />
                        ))}
                      </div>
                    ) : (
                      <div className="flex flex-col items-center justify-center py-32 glass-panel rounded-[3rem] text-center px-4">
                        <div className="w-24 h-24 bg-gray-200/50 dark:bg-gray-800/50 rounded-full flex items-center justify-center mb-6">
                           <Icon name="fileText" className="w-12 h-12 text-gray-400" size={48} />
                        </div>
                        <h3 className="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-2">Tiada Bahan Ditemui</h3>
                        <p className="text-gray-500 dark:text-gray-400 max-w-md">Belum ada slaid pembentangan dimuat naik untuk kategori ini. Sila hubungi admin sekolah anda.</p>
                      </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          </div>
        </AppContext.Provider>
      );
    }

    // --- Mount React App to DOM ---
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
